<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archangel Weapon Systems</title>
  <meta name="description" content="Archangel Weapon Systems - Website Coming Soon">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #fff;
      color: #000;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      width: 100%;
      max-width: 900px;
      padding: 48px 24px;
    }

    .logo {
      max-width: 520px;
      width: 85%;
      height: auto;
      margin: 0 auto 36px;
      display: block;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .tagline {
      margin: 0 0 28px;
      font-size: clamp(17px, 2.5vw, 22px);
      letter-spacing: 0.08em;
      color: #333;
      text-transform: uppercase;
    }

    .contact {
      margin: 0;
      font-size: 16px;
      color: #444;
    }

    a {
      color: #444;
      text-decoration: none;
    }

    a:hover {
      color: #000;
    }
  </style>
</head>

<body>
  <main class="container">
    <img class="logo" src="archangel_logo_ultra_high_res_black_on_white.png" alt="Archangel Weapon Systems logo">

    <h1>Archangel Weapon Systems</h1>

    <p class="tagline">Website Coming Soon</p>

    <p class="contact">
      <a href="mailto:Kevin.Sustala@archangelweapons.com">

</html>
